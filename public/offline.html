<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>オフラインです - 近くナビ</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #f9fafb;
    color: #111827;
    text-align: center;
    padding: 24px;
  }
  .box { max-width: 360px; }
  .emoji { font-size: 48px; }
  h1 { font-size: 18px; margin: 12px 0 8px; }
  p { font-size: 14px; color: #6b7280; line-height: 1.6; }
  button {
    margin-top: 16px;
    padding: 10px 24px;
    border-radius: 999px;
    border: none;
    background: #4f46e5;
    color: white;
    font-weight: 600;
    font-size: 14px;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="emoji">📡</div>
    <h1>電波の届かない場所にいるようです</h1>
    <p>インターネット接続が確認できませんでした。電波の良い場所に移動してから、もう一度お試しください。</p>
    <button onclick="location.reload()">再読み込み</button>
  </div>
</body>
</html>
